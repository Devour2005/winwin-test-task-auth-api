spring:
  application:
    name: auth-api
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/winwin_app}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database: POSTGRESQL
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        enable_lazy_load_no_trans: true
        jdbc:
          time_zone: UTC
        ddl-auto: none
  flyway:
    enabled: true
    baseline-on-migrate: false
    baseline-version: 0
    locations: classpath:db/migration
    schemas: public
    validate-on-migrate: true
    clean-disabled: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

data-api:
  base-url: ${DATA_API_BASE_URL:http://localhost:8081}
  internal-token: ${INTERNAL_TOKEN}
